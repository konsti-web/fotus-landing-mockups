<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fotus · 5 Landing Page Richtungen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;460;520;620;760;840&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050607;
      --surface: #101316;
      --surface-2: #171b20;
      --text: #f4f7f2;
      --muted: #a9b4ad;
      --line: rgba(244, 247, 242, .12);
      --accent: #8eea45;
      --accent-2: #5aa7ff;
      --paper: #f6f8f3;
      --ink: #090b0d;
      --font: "Geist", ui-sans-serif, system-ui, sans-serif;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .app-shell {
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at 76% 0%, color-mix(in srgb, var(--accent) 17%, transparent), transparent 32rem),
        linear-gradient(180deg, color-mix(in srgb, var(--bg) 96%, white), var(--bg));
    }

    .chooser {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
    }

    .chooser-inner {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 840;
      font-size: 20px;
      white-space: nowrap;
    }

    .mark {
      width: 32px;
      height: 32px;
      border-radius: 11px;
      background: var(--text);
      color: var(--bg);
      display: grid;
      place-items: center;
      font-weight: 840;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      color: var(--muted);
      border-radius: 999px;
      min-height: 38px;
      padding: 0 13px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 620;
    }

    .tab[aria-selected="true"] {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    .landing {
      --section-gap: clamp(68px, 9vw, 128px);
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 38px 0 80px;
    }

    .hero {
      min-height: calc(100svh - 110px);
      display: grid;
      grid-template-columns: .92fr 1.08fr;
      gap: clamp(32px, 6vw, 76px);
      align-items: center;
      padding: 32px 0 54px;
    }

    .eyeline {
      color: var(--accent);
      font-size: 13px;
      font-weight: 760;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      max-width: 800px;
      font-size: clamp(58px, 8.5vw, 118px);
      line-height: .86;
      font-weight: 520;
      letter-spacing: 0;
    }

    .serif {
      font-family: var(--serif, "Instrument Serif", Georgia, serif);
      font-style: italic;
      font-weight: 400;
    }

    .lead {
      margin: 26px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 23px);
      line-height: 1.46;
      font-weight: 460;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .button {
      min-height: 46px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 760;
      background: var(--accent);
      color: var(--bg);
      border: 1px solid var(--accent);
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--line);
    }

    .proof {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 38px;
      max-width: 760px;
    }

    .hero-proof {
      grid-column: 1 / -1;
      max-width: none;
      margin-top: 0;
    }

    .proof-item {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      color: color-mix(in srgb, var(--text) 86%, transparent);
      font-size: 14px;
      line-height: 1.36;
    }

    .proof-item strong {
      display: block;
      color: var(--accent);
      font-size: 26px;
      line-height: 1;
      margin-bottom: 7px;
    }

    .visual {
      position: relative;
      min-height: 650px;
      display: grid;
      place-items: center;
    }

    .visual::before {
      content: "";
      position: absolute;
      inset: 8% 0 6% 10%;
      border-radius: 44px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 16%, transparent), transparent 45%),
        repeating-linear-gradient(120deg, rgba(255,255,255,.055) 0 1px, transparent 1px 11px),
        color-mix(in srgb, var(--surface) 84%, black);
      border: 1px solid var(--line);
      transform: rotate(var(--panel-rotate, -3deg));
    }

    .dashboard-preview {
      width: min(620px, 96%);
      min-height: 440px;
      border-radius: 34px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.026)),
        color-mix(in srgb, var(--surface) 88%, black);
      box-shadow: 0 34px 100px rgba(0,0,0,.42);
      padding: 22px;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .dashboard-preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 8%, transparent)),
        repeating-linear-gradient(0deg, transparent 0 42px, rgba(255,255,255,.04) 42px 43px);
      pointer-events: none;
    }

    .dashboard-preview > * {
      position: relative;
      z-index: 1;
    }

    .dash-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .dash-title {
      color: var(--text);
      font-size: 23px;
      font-weight: 760;
      line-height: 1.05;
    }

    .dash-sub {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.38;
      max-width: 350px;
    }

    .dash-pill {
      border-radius: 999px;
      background: var(--accent);
      color: var(--bg);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .dash-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .dash-metric {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.045);
      padding: 14px;
      min-height: 96px;
    }

    .dash-metric strong {
      display: block;
      color: var(--accent);
      font-size: 28px;
      line-height: 1;
      margin-bottom: 9px;
    }

    .dash-metric span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.28;
    }

    .dash-table {
      display: grid;
      gap: 9px;
    }

    .dash-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.052);
      border: 1px solid var(--line);
      padding: 12px 13px;
      font-size: 14px;
      font-weight: 620;
    }

    .dash-row span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 460;
      margin-top: 3px;
    }

    .dash-row .tag {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
    }

    .phone {
      width: min(390px, 88vw);
      aspect-ratio: 9 / 19.5;
      border-radius: 50px;
      padding: 10px;
      background: #050607;
      box-shadow: 0 42px 120px rgba(0,0,0,.56), 0 0 0 1px rgba(255,255,255,.15);
      position: relative;
      z-index: 2;
      transform: rotate(var(--phone-rotate, 2deg));
    }

    .client-phone {
      position: absolute;
      width: min(245px, 42vw);
      right: 0;
      bottom: 34px;
      z-index: 3;
      transform: rotate(var(--client-phone-rotate, 4deg));
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 94px;
      height: 28px;
      border-radius: 999px;
      background: #050607;
      z-index: 4;
    }

    .screen {
      height: 100%;
      overflow: hidden;
      border-radius: 40px;
      padding: 58px 20px 20px;
      background: var(--screen-bg);
      color: var(--screen-text);
      position: relative;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--screen-wash, transparent);
      pointer-events: none;
    }

    .screen > * { position: relative; z-index: 1; }

    .mobile-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 760;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .hamburger {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid currentColor;
      display: grid;
      place-items: center;
      opacity: .45;
    }

    .screen h2 {
      margin: 0;
      font-size: 42px;
      line-height: .9;
      font-weight: 520;
      letter-spacing: 0;
    }

    .screen p {
      margin: 13px 0 0;
      color: var(--screen-muted);
      font-size: 14px;
      line-height: 1.42;
    }

    .mobile-cta {
      display: inline-flex;
      margin-top: 18px;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--accent);
      color: var(--bg);
      padding: 0 14px;
      font-size: 13px;
      font-weight: 760;
    }

    .app-stack {
      display: grid;
      gap: 11px;
      margin-top: 24px;
    }

    .app-card {
      border-radius: 20px;
      border: 1px solid var(--screen-line);
      background: var(--screen-card);
      padding: 14px;
    }

    .app-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .app-row span {
      display: block;
      margin-top: 4px;
      color: var(--screen-muted);
      font-size: 12px;
      font-weight: 460;
    }

    .tag {
      border-radius: 999px;
      padding: 6px 9px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      color: var(--accent);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .progress {
      height: 7px;
      border-radius: 999px;
      background: var(--screen-line);
      overflow: hidden;
      margin-top: 10px;
    }

    .progress i {
      display: block;
      height: 100%;
      width: var(--w);
      border-radius: inherit;
      background: var(--accent);
    }

    .page-section {
      padding: var(--section-gap) 0 0;
    }

    .section-grid {
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: clamp(28px, 5vw, 74px);
      align-items: start;
    }

    .section-title {
      margin: 0;
      font-size: clamp(40px, 6vw, 76px);
      line-height: .92;
      font-weight: 520;
      letter-spacing: 0;
    }

    .section-copy {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
      max-width: 690px;
    }

    .feature-list {
      display: grid;
      gap: 16px;
    }

    .feature {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 16px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }

    .feature:first-child { border-top: 0; padding-top: 0; }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: var(--bg);
      font-weight: 840;
    }

    .feature h3 {
      margin: 0;
      font-size: 23px;
      line-height: 1.08;
      font-weight: 620;
    }

    .feature p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 38px;
    }

    .role-card {
      min-height: 380px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .role-card h3 {
      margin: 0;
      font-size: 32px;
      line-height: .96;
      font-weight: 560;
    }

    .role-card p {
      margin: 13px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .mini-ui {
      display: grid;
      gap: 10px;
      margin-top: 28px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.045);
      padding: 13px;
      font-size: 14px;
      font-weight: 620;
    }

    .mini-row span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 460;
    }

    .quote {
      margin-top: var(--section-gap);
      border: 1px solid var(--line);
      border-radius: 34px;
      padding: clamp(30px, 6vw, 62px);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 12%, transparent), transparent),
        color-mix(in srgb, var(--surface) 82%, transparent);
      display: grid;
      grid-template-columns: .85fr 1.15fr;
      gap: 34px;
      align-items: center;
    }

    .quote-title {
      margin: 0;
      font-size: clamp(36px, 5vw, 68px);
      line-height: .92;
      font-weight: 520;
    }

    .quote p {
      margin: 0;
      color: color-mix(in srgb, var(--text) 86%, transparent);
      font-size: clamp(20px, 2.3vw, 29px);
      line-height: 1.34;
    }

    .final-cta {
      margin-top: var(--section-gap);
      display: grid;
      grid-template-columns: .85fr 1.15fr;
      gap: 24px;
      align-items: end;
    }

    .cta-card {
      border-radius: 34px;
      background: var(--text);
      color: var(--bg);
      padding: clamp(30px, 5vw, 56px);
    }

    .cta-card h2 {
      margin: 0;
      font-size: clamp(40px, 5.4vw, 76px);
      line-height: .9;
      font-weight: 520;
    }

    .cta-card p {
      color: color-mix(in srgb, var(--bg) 72%, transparent);
      font-size: 18px;
      line-height: 1.5;
    }

    .cta-note {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
      padding-bottom: 10px;
    }

    .theme-everyday {
      --bg: #f3f6f0;
      --surface: #ffffff;
      --surface-2: #e8eee6;
      --text: #0d130f;
      --muted: #56625b;
      --line: rgba(13,19,15,.12);
      --accent: #1f8f4c;
      --accent-2: #397be8;
      --font: "Manrope", ui-sans-serif, system-ui, sans-serif;
      --screen-bg: #f8faf6;
      --screen-text: #101612;
      --screen-muted: #627068;
      --screen-line: rgba(16,22,18,.11);
      --screen-card: #ffffff;
      color-scheme: light;
    }

    .theme-human {
      --bg: #080807;
      --surface: #14130f;
      --surface-2: #202018;
      --text: #f8f4ea;
      --muted: #bbb5a7;
      --line: rgba(248,244,234,.13);
      --accent: #d7ff72;
      --accent-2: #f0ce8d;
      --font: "Geist", ui-sans-serif, system-ui, sans-serif;
      --serif: "Newsreader", Georgia, serif;
      --screen-bg: #11110d;
      --screen-text: #f8f4ea;
      --screen-muted: #b7b0a2;
      --screen-line: rgba(248,244,234,.12);
      --screen-card: rgba(248,244,234,.06);
    }

    .theme-precision {
      --bg: #05070a;
      --surface: #0d1217;
      --surface-2: #151d24;
      --text: #f2f8fb;
      --muted: #9fb1bc;
      --line: rgba(242,248,251,.12);
      --accent: #63d7ff;
      --accent-2: #8eea45;
      --font: "Geist", ui-sans-serif, system-ui, sans-serif;
      --screen-bg: #091015;
      --screen-text: #f2f8fb;
      --screen-muted: #93a7b2;
      --screen-line: rgba(242,248,251,.12);
      --screen-card: rgba(242,248,251,.055);
    }

    .theme-coach {
      --bg: #07080a;
      --surface: #101216;
      --surface-2: #191c22;
      --text: #f7f8f4;
      --muted: #adb5ae;
      --line: rgba(247,248,244,.12);
      --accent: #a3ff4f;
      --accent-2: #ffffff;
      --font: "Geist", ui-sans-serif, system-ui, sans-serif;
      --screen-bg: #111419;
      --screen-text: #f7f8f4;
      --screen-muted: #9fa9a3;
      --screen-line: rgba(247,248,244,.12);
      --screen-card: rgba(247,248,244,.055);
      --panel-rotate: 2deg;
      --phone-rotate: -2deg;
    }

    .theme-launch {
      --bg: #f7f7f4;
      --surface: #ffffff;
      --surface-2: #ededeb;
      --text: #070807;
      --muted: #626a63;
      --line: rgba(7,8,7,.12);
      --accent: #111;
      --accent-2: #63aaff;
      --font: "Geist", ui-sans-serif, system-ui, sans-serif;
      --screen-bg: #090a0b;
      --screen-text: #f7f7f4;
      --screen-muted: #a4aaa4;
      --screen-line: rgba(247,247,244,.12);
      --screen-card: rgba(247,247,244,.06);
      color-scheme: light;
    }

    @media (max-width: 920px) {
      .chooser-inner {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        padding: 12px 0;
      }

      .landing { width: min(100% - 24px, 560px); padding-top: 22px; }
      .hero { display: block; min-height: auto; padding-top: 26px; }
      h1 {
        font-size: clamp(42px, 12vw, 60px);
        line-height: .92;
      }
      .lead { font-size: 18px; }
      .actions .button { width: 100%; }
      .proof {
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 26px;
      }
      .proof-item {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 13px 14px;
        background: color-mix(in srgb, var(--surface) 76%, transparent);
      }
      .proof-item strong {
        font-size: 18px;
        margin-bottom: 4px;
      }
      .visual { min-height: 590px; margin-top: 28px; }
      .visual::before { inset: 34px -20px 26px 16px; }
      .dashboard-preview { width: 100%; min-height: 430px; padding: 18px; }
      .dash-metrics { grid-template-columns: 1fr; }
      .dash-row { font-size: 13px; }
      .phone { width: min(360px, 90vw); transform: none; }
      .client-phone {
        position: relative;
        width: min(300px, 78vw);
        right: auto;
        bottom: auto;
        margin-top: -70px;
        justify-self: end;
      }
      .hero-proof {
        margin-top: 20px;
      }
      .section-grid, .split, .quote, .final-cta { grid-template-columns: 1fr; }
      .split { gap: 14px; }
      .role-card { min-height: 320px; }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="shell">
    <header class="chooser">
      <div class="chooser-inner">
        <a href="#" class="brand" aria-label="fotus Landing Page Richtungen"><span class="mark">f</span><span>fotus</span></a>
        <nav class="tabs" id="tabs" aria-label="Landing Page Richtungen"></nav>
      </div>
    </header>

    <main class="landing" id="landing"></main>
  </div>

  <script>
    const directions = [
      {
        id: "luxury",
        name: "Luxury Performance",

    const shell = document.getElementById("shell");
    const tabs = document.getElementById("tabs");
    const landing = document.getElementById("landing");

    function sectionFeatures(items) {
      return items.map((item) => `
        <article class="feature">
          <div class="icon">${item[0]}</div>
          <div><h3>${item[1]}</h3><p>${item[2]}</p></div>
        </article>
      `).join("");
    }

    function roleCards(items) {
      return items.map((role) => `
        <article class="role-card">
          <div><h3>${role[0]}</h3><p>${role[1]}</p></div>
          <div class="mini-ui">
            ${role[2].map((label, index) => `<div class="mini-row"><div>${label}<span>${index === 0 ? "wichtig im Alltag" : index === 1 ? "direkt erreichbar" : "klar priorisiert"}</span></div><div class="tag">${index + 1}</div></div>`).join("")}
          </div>
        </article>
      `).join("");
    }

    function render(direction) {
      shell.className = `app-shell ${direction.theme}`;
      landing.innerHTML = `
        <section class="hero">
          <div>
            <div class="eyeline">${direction.label}</div>
            <h1>${direction.headline}</h1>
            <p class="lead">${direction.lead}</p>
            <div class="actions">
              <a class="button" href="#cta">${direction.cta}</a>
              <a class="button secondary" href="#produkt">${direction.secondary}</a>
            </div>
          </div>

          <div class="visual" aria-label="Coach Dashboard und Kunden-App Vorschau">
            <div class="dashboard-preview" aria-label="Coach Dashboard Vorschau">
              <div class="dash-top">
                <div>
                  <div class="dash-title">${direction.dashboardTitle}</div>
                  <div class="dash-sub">${direction.dashboardCopy}</div>
                </div>
                <div class="dash-pill">Live Übersicht</div>
              </div>
              <div class="dash-metrics">
                ${direction.dashboardMetrics.map((metric) => `<div class="dash-metric"><strong>${metric[0]}</strong><span>${metric[1]}</span></div>`).join("")}
              </div>
              <div class="dash-table">
                ${direction.dashboardRows.map((row) => `<div class="dash-row"><div>${row[0]}<span>${row[1]}</span></div><div class="tag">${row[2]}</div></div>`).join("")}
              </div>
            </div>

            <div class="phone client-phone">
              <div class="screen">
                <div class="mobile-top"><span>fotus</span><span class="hamburger">≡</span></div>
                <h2>${direction.phoneTitle}</h2>
                <p>${direction.phoneCopy}</p>
                <a class="mobile-cta">${direction.cta}</a>
                <div class="app-stack">
                  ${direction.phoneCards.map((card) => `
                    <div class="app-card">
                      <div class="app-row"><div>${card[0]}<span>${card[1]}</span></div><div class="tag">${card[2]}</div></div>
                      <div class="progress"><i style="--w:${card[3]}%"></i></div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
          </div>

          <div class="proof hero-proof">
            ${direction.proof.map((item) => `<div class="proof-item"><strong>${item[0]}</strong>${item[1]}</div>`).join("")}
          </div>
        </section>

        <section id="produkt" class="page-section section-grid">
          <div>
            <div class="eyeline">Philosophie</div>
            <h2 class="section-title">${direction.philosophyTitle}</h2>
            <p class="section-copy">${direction.philosophyCopy}</p>
          </div>
          <div class="feature-list">${sectionFeatures(direction.features)}</div>
        </section>

        <section class="page-section">
          <div class="eyeline">Premium Coaching</div>
          <h2 class="section-title">Starkes Dashboard. Starkes Kundenerlebnis.</h2>
          <p class="section-copy">Der Coach bekommt die Steuerzentrale. Der Kunde bekommt eine einfache, hochwertige Betreuungserfahrung. Das ist die eigentliche Produktlogik.</p>
          <div class="split">${roleCards(direction.roles)}</div>
        </section>

        <section class="quote">
          <h2 class="quote-title">${direction.quoteTitle}</h2>
          <p>${direction.quote}</p>
        </section>

        <section id="cta" class="final-cta">
          <div class="cta-note">Diese Richtung ist eine vollständige Landing-Page-Positionierung. Fokus: Premium-Coaching-Software für Coaches, die ihren Kunden ein besseres Betreuungserlebnis geben wollen.</div>
          <div class="cta-card">
            <h2>${direction.cta}</h2>
            <p>Für Coaches, die Training, Ernährung, Form-Checks, Chat und Kundenstatus in einem professionellen Dashboard steuern wollen.</p>
            <a class="button" href="mailto:hello@fotus-fitness.de">${direction.cta}</a>
          </div>
        </section>
      `;

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.id === direction.id));
      });
      history.replaceState(null, "", `#${direction.id}`);
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    tabs.innerHTML = directions.map((direction) => `<button class="tab" data-id="${direction.id}" aria-selected="false">${direction.name}</button>`).join("");
    tabs.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-id]");
      if (!button) return;
      render(directions.find((direction) => direction.id === button.dataset.id));
    });

    const initialId = window.location.hash.replace("#", "");
    render(directions.find((direction) => direction.id === initialId) || directions[0]);
  </script>
